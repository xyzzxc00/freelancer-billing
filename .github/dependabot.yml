version: 2
updates:
  # npm 依賴：每週檢查一次，把安全性/版本更新開成 PR
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # 把非重大版本更新合併成單一 PR，減少雜訊
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions 本身的版本更新
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
